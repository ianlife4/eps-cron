name: EPS Daily Cron

on:
  # 由 Cloudflare Cron 準時觸發 (eps-cron-trigger Worker, 22:00 TW = "0 14 * * 1-5")
  # → repository_dispatch → GHA 秒開, 不再被 GHA schedule 排隊拖 ~4h 到半夜。2026-06-15 起。
  # (原 schedule cron '7 12 * * 1-5' 已移除; 若 CF 失效要回退, 把它加回 on: 即可。)
  repository_dispatch:
    types: [eps-run]
  workflow_dispatch:
    inputs:
      force_all:
        description: '全部當新公告 (backfill / 重跑)'
        type: boolean
        default: false
      no_ai:
        description: '跳過 AI 評分'
        type: boolean
        default: false
      max_ai:
        description: 'AI 評分最大筆數'
        type: string
        default: '100'
      no_revenue:
        description: '跳過月營收 (省一半時間)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install CJK fonts (for PNG render)
        continue-on-error: true   # 字型只供 PNG; apt 暫時性失敗(exit 100)不該中斷整個 job
        run: |
          sudo apt-get update || sudo apt-get update || true
          sudo apt-get install -y fonts-noto-cjk || true

      - name: Install deps
        run: pip install -r requirements.txt anthropic pydantic

      - name: Run EPS daily
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SCORE_MODEL: ${{ vars.SCORE_MODEL || 'claude-haiku-4-5' }}
        run: |
          ARGS="--scope twse_tpex"
          if [ "${{ inputs.force_all }}" = "true" ]; then
            ARGS="$ARGS --force-all"
          fi
          if [ "${{ inputs.no_ai }}" = "true" ]; then
            ARGS="$ARGS --no-ai"
          fi
          ARGS="$ARGS --max-ai ${{ inputs.max_ai || '100' }}"
          if [ "${{ inputs.no_revenue }}" = "true" ]; then
            ARGS="$ARGS --no-revenue"
          fi
          echo "Running: python src/main.py $ARGS"
          python src/main.py $ARGS

      - name: Commit snapshot + report (idempotent)
        run: |
          git config user.name "eps-cron-bot"
          git config user.email "eps-cron@noreply.github.com"
          # 不 commit *.png (檔多易爆, TG 已收到)
          git add data/snapshots/ reports/*.xlsx || true
          # idempotent skip — 沿用 aurora-cron pattern
          if git diff --staged --quiet; then
            echo "✓ No changes (idempotent skip)"
          else
            git commit -m "📊 EPS daily $(date -u +'%Y-%m-%d %H:%M UTC')"
            # rebase 到最新 origin 再推, 避免 non-fast-forward 失敗 (6/3 run 失敗主因)
            git pull --rebase -X theirs origin main || true
            git push origin main
            echo "✓ Committed snapshot + report"
          fi

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eps-report-${{ github.run_id }}
          path: reports/*.xlsx
          retention-days: 30
