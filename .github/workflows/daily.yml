name: EPS Daily Cron

on:
  schedule:
    # 單次/日 — 私有 repo 免費 Actions 只有 2000 min/月; 原本雙跑 ~3960 min 會月底爆掉
    # (5/28-5/29 就是額度爆 job 不啟動)。單跑 ~1980 min 壓回額度內。
    # 用「冷門分鐘」避開 GHA 排程壅塞: 實測 :00 整點被延遲 8-9h, :30 只 0.5-2.4h。
    # 12:07 UTC = 20:07 TW — 收盤後+當天多數自結已公告, 跑完約 22-23h, 通常午夜前。
    - cron: '7 12 * * 1-5'
  # 終極解 (保證午夜前、不看 GHA 排程臉色): Cloudflare Cron → repository_dispatch
  # 在 22:00 TW 準時打這個 → GHA 立刻跑 (事件觸發, 秒開) → ~23:30 完成推 TG。
  repository_dispatch:
    types: [eps-run]
  workflow_dispatch:
    inputs:
      force_all:
        description: '全部當新公告 (backfill / 重跑)'
        type: boolean
        default: false
      no_ai:
        description: '跳過 AI 評分'
        type: boolean
        default: false
      max_ai:
        description: 'AI 評分最大筆數'
        type: string
        default: '100'
      no_revenue:
        description: '跳過月營收 (省一半時間)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install CJK fonts (for PNG render)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install deps
        run: pip install -r requirements.txt anthropic pydantic

      - name: Run EPS daily
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SCORE_MODEL: ${{ vars.SCORE_MODEL || 'claude-haiku-4-5' }}
        run: |
          ARGS="--scope twse_tpex"
          if [ "${{ inputs.force_all }}" = "true" ]; then
            ARGS="$ARGS --force-all"
          fi
          if [ "${{ inputs.no_ai }}" = "true" ]; then
            ARGS="$ARGS --no-ai"
          fi
          ARGS="$ARGS --max-ai ${{ inputs.max_ai || '100' }}"
          if [ "${{ inputs.no_revenue }}" = "true" ]; then
            ARGS="$ARGS --no-revenue"
          fi
          echo "Running: python src/main.py $ARGS"
          python src/main.py $ARGS

      - name: Commit snapshot + report (idempotent)
        run: |
          git config user.name "eps-cron-bot"
          git config user.email "eps-cron@noreply.github.com"
          # 不 commit *.png (檔多易爆, TG 已收到)
          git add data/snapshots/ reports/*.xlsx || true
          # idempotent skip — 沿用 aurora-cron pattern
          if git diff --staged --quiet; then
            echo "✓ No changes (idempotent skip)"
          else
            git commit -m "📊 EPS daily $(date -u +'%Y-%m-%d %H:%M UTC')"
            # rebase 到最新 origin 再推, 避免 non-fast-forward 失敗 (6/3 run 失敗主因)
            git pull --rebase -X theirs origin main || true
            git push origin main
            echo "✓ Committed snapshot + report"
          fi

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eps-report-${{ github.run_id }}
          path: reports/*.xlsx
          retention-days: 30
